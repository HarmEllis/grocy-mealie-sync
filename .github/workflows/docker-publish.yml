name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write # Required for cosign keyless signing (OIDC)

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      ref: ${{ steps.version.outputs.tag }}
      image_ref: ${{ steps.image.outputs.ref }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      primary_tag: ${{ steps.primary_tag.outputs.value }}

    steps:
      - name: Resolve version tag
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Expected tag in form vMAJOR.MINOR.PATCH, got: $TAG" >&2
              exit 1
              ;;
          esac

          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Expected tag in form vMAJOR.MINOR.PATCH, got: $TAG" >&2
            exit 1
          fi

      - name: Normalize image reference
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          image_name="$(printf '%s' "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "ref=${REGISTRY}/${image_name}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(steps.version.outputs.tag, '-') }}

      - name: Capture primary tag
        id: primary_tag
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          primary_tag="$(printf '%s\n' "$TAGS" | head -n 1)"
          echo "value=${primary_tag}" >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: prepare
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image by digest
        id: build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/amd64
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=${{ needs.prepare.outputs.image_ref }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=linux-amd64
          cache-to: type=gha,mode=max,scope=linux-amd64
          provenance: mode=max
          sbom: true

  build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/arm64 image by digest
        id: build
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: .
          platforms: linux/arm64
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=${{ needs.prepare.outputs.image_ref }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=linux-arm64
          cache-to: type=gha,mode=max,scope=linux-arm64
          provenance: mode=max
          sbom: true

  merge-and-push:
    needs:
      - prepare
      - build-amd64
      - build-arm64
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifest
        id: manifest
        env:
          IMAGE: ${{ needs.prepare.outputs.image_ref }}
          TAGS: ${{ needs.prepare.outputs.tags }}
          PRIMARY_TAG: ${{ needs.prepare.outputs.primary_tag }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t tags < <(printf '%s\n' "$TAGS" | sed '/^$/d')
          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"

          digest=""
          for attempt in 1 2 3 4 5; do
            digest="$(docker buildx imagetools inspect "$PRIMARY_TAG" | awk '/Digest:/ { print $2; exit }' || true)"
            if [ -n "$digest" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$digest" ]; then
            echo "Failed to resolve manifest digest for $PRIMARY_TAG" >&2
            exit 1
          fi

          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign the published Docker image
        env:
          DIGEST: ${{ steps.manifest.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail

          image_ref="${{ needs.prepare.outputs.image_ref }}@${DIGEST}"
          for attempt in 1 2 3; do
            if cosign sign --yes "$image_ref"; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep 10
            fi
          done

          echo "Failed to sign image after 3 attempts: $image_ref" >&2
          exit 1

      # Best-effort scanning: logs vulnerabilities but does not block the release
      # All action refs are SHA-pinned to mitigate supply chain attacks
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ needs.prepare.outputs.image_ref }}@${{ steps.manifest.outputs.digest }}
          format: "table"
          severity: "CRITICAL,HIGH"
