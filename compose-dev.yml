services:
  grocy:
    # SECURITY: Pin to a specific version for reproducible builds. Update deliberately.
    image: lscr.io/linuxserver/grocy:4.6.0@sha256:3734cf765d943120afc9b98ae36ac980bd498d37cd269cd5ad6be3c993ba22a2
    container_name: grocy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - grocy_config:/config
    ports:
      - 9001:80
    restart: unless-stopped
    ## Uncomment the following lines to be able to run the grocy container and clear/ restore a config backup
    ## sudo docker compose -f compose-dev.yml down -v grocy # removes volume
    ## sudo docker compose -f compose-dev.yml up -d grocy # first uncomment the entrypoint and command override
    ## sudo docker compose -f compose-dev.yml cp configbackup/. grocy:/config/ # Restore a local backup to the container volume
    ## sudo docker compose -f compose-dev.yml up -d grocy # first comment the entrypoint and command override out
    # entrypoint: ["/bin/sh", "-c"]
    # command: ["sleep infinity"]

  mealie:
    # SECURITY: Pin to a specific version for reproducible builds. Update deliberately.
    image: ghcr.io/mealie-recipes/mealie:v3.14.0@sha256:b9fac07e6daaabd8c29d0dc97965c2f500ce7d6b188b0c51f494627f23ad32f2
    container_name: mealie
    ports:
      - 9000:9000
    deploy:
      resources:
        limits:
          memory: 1000M #
    depends_on:
      - postgres
    volumes:
      - mealie-data:/app/data/
    environment:
      # Set Backend ENV Variables Here
      # SECURITY WARNING: ALLOW_SIGNUP=true lets anyone create accounts.
      # Set to false in production or when exposed beyond localhost.
      - ALLOW_SIGNUP=true
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - MAX_WORKERS=1
      - WEB_CONCURRENCY=1
      - BASE_URL=http://mealie:9000
      - DB_ENGINE=postgres
      - POSTGRES_USER=mealie
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mealie
    restart: unless-stopped
  postgres:
    container_name: postgres
    image: postgres:15@sha256:3e43515057e113ee741fca2f621f15300be34a6d4a8dfcf2e20651288c8272f3
    restart: always
    volumes:
      - mealie-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=mealie
volumes:
  grocy_config:
  mealie-data:
  mealie-pgdata:

networks:
  default:
    name: grocy-mealie-sync